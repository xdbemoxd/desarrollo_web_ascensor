<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Ascensor</title>
    <link rel="stylesheet" href="styless.css">
</head>

<body>
    <div class="contenedor">
        <h1>Simulador de Ascensor</h1>

        <div class="panel">
            <p id="panel-estado">Estado: Detenido 🛑</p>
            <p id="panel-piso-actual">Piso actual: 0</p>
            <p id="panel-pendientes">Solicitudes pendientes: ninguna</p>
            <p id="panel-atendidas">Solicitudes atendidas: 0</p>
            <p id="panel-evento">Último evento registrado: —</p>
        </div>

        <div id="edificio" class="ascensor"></div>

        <div class="controles">
            <a class="boton" href="historial.html">Ver historial</a>
            <button class="boton" id="btn-limpiar">Limpiar historial</button>
            <button class="boton" id="btn-reiniciar">Reiniciar simulador</button>
        </div>
    </div>

    <script src="baseDatos.js"></script>
    <script src="script.js"></script>
</body>

</html>
